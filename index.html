<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open BJJ Round Timer</title>
    <meta name="theme-color" content="#0f1115" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BJJ Timer" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Round Timer</h1>
      <p class="subtitle">Custom round timer</p>
      <button id="installAppBtn" class="installBanner hidden" type="button">Install app</button>
      <button id="audioEnableBanner" class="audioBanner" type="button">
        Tap to enable audio
      </button>

      <section class="config card" id="settingsCard">
        <div class="settingsHeader">
          <h2>Session Setup</h2>
          <button id="toggleSettingsBtn" class="settingsToggleBtn" type="button">Hide Settings</button>
        </div>
        <div class="grid" id="settingsGrid">
          <label>
            Round Minutes
            <input id="roundMinutes" type="number" min="0" value="5" />
          </label>
          <label>
            Round Seconds
            <input id="roundSecondsPart" type="number" min="0" max="59" value="0" />
          </label>
          <label>
            Rest Length
            <input id="restSeconds" type="number" min="0" value="60" />
          </label>
          <label>
            Total Rounds
            <input id="totalRounds" type="number" min="1" value="6" />
          </label>
          <label>
            Warmup Countdown
            <input id="warmupSeconds" type="number" min="0" value="10" />
          </label>
          <label class="checkboxLabel">
            <input id="countdownBeepsEnabled" type="checkbox" checked />
            Last 5-second warning beeps
          </label>
          <label class="checkboxLabel">
            <input id="refModeEnabled" type="checkbox" />
            Ref Mode (IBJJF audio)
          </label>
          <label class="checkboxLabel">
            <input id="keepAwakeEnabled" type="checkbox" checked />
            Keep screen awake while timer runs
          </label>
          <label class="switchLabel" for="lightModeEnabled">
            <span>Theme</span>
            <span class="switchControl">
              <input id="lightModeEnabled" type="checkbox" />
              <span class="switchSlider" aria-hidden="true"></span>
            </span>
          </label>
        </div>
      </section>

      <section class="timer card" id="timerCard">
        <p class="phase" id="phaseLabel">Ready</p>
        <p class="time" id="timeLabel">05:00</p>
        <p class="round" id="roundLabel">Round 1 / 6</p>

        <div class="controls">
          <button id="startBtn">Start</button>
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
          <button id="fullscreenBtn">Fullscreen</button>
        </div>
        <p class="hint">Keyboard: Space = start/pause, R = reset, F = fullscreen</p>
      </section>

      <footer class="appFooter">
        <a
          href="https://github.com/davehearne/RoundTImer"
          target="_blank"
          rel="noreferrer"
          aria-label="Open source on GitHub"
          title="Open source on GitHub"
        >
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
              .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
              -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.66 7.66 0 0 1 4 0c1.53-1.04 2.2-.82
              2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95
              .29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8
              c0-4.42-3.58-8-8-8Z"
            ></path>
          </svg>
        </a>
      </footer>
    </main>

    <script src="./src/app.js"></script>
  </body>
</html>
